tosca_definitions_version: tosca_2_0
description: stress-ng workload as a Swarmchestrate SAT - variant with monitoring-team
  supported metrics (testing; original KB SAT metrics are not EMS-provisioned)
metadata:
  name: stressng
  author: you
  date: '2026-05-05'
  version: 1.0
  tags:
  - stressng
imports:
- namespace: swch
  url: https://raw.githubusercontent.com/Swarmchestrate/tosca/refs/heads/main/profiles/eu.swarmchestrate/profile.yaml
service_template:
  node_templates:
    swarm:
      type: swch:Swarm
      directives:
      - substitute
    stressng:
      type: swch:Microservice
      properties:
        image: docker.io/gunjank05/stress-ng
        replicas: 1
        labels:
          app: stressng
          service: stressng
        command:
        - stress-ng
        args:
        - --cpu
        - '1'
        - --vm
        - '1'
        - --vm-bytes
        - 256M
        - --timeout
        - 3600s
        - --metrics-brief
        ports: []
      capabilities:
        metrics:
          properties:
            raw:
            - name: cpu_idle_instance
              sensor: netdata
              config:
                scope_contexts: system.cpu
                dimensions: idle
              collection_frequency: 30 sec
              collection_output: all
            - name: ram_free_instance
              sensor: netdata
              config:
                scope_contexts: system.ram
                dimensions: free
              collection_frequency: 30 sec
              collection_output: all
            - name: ram_total_instance
              sensor: netdata
              config:
                scope_contexts: system.ram
                results-aggregation: SUM
              collection_frequency: 30 sec
              collection_output: all
            - name: disk_read_activity
              sensor: netdata
              config:
                scope_contexts: system.io
                dimensions: reads
              collection_frequency: 10 sec
              collection_output: all
            - name: disk_write_activity
              sensor: netdata
              config:
                scope_contexts: system.io
                dimensions: writes
              collection_frequency: 10 sec
              collection_output: all
            composite:
            - name: cpu_util_prct
              formula: 100 - mean(cpu_idle_instance)
              collection_frequency: 30 sec
              collection_output: all
              window_type: sliding
              window_size: 5 min
              grouping: global
            - name: ram_util_prct
              formula: (mean(ram_total_instance)-mean(ram_free_instance))/mean(ram_total_instance)
              collection_frequency: 30 sec
              collection_output: all
              window_type: sliding
              window_size: 5 min
              grouping: global
            - name: avg_disk_utilization
              formula: abs(mean(disk_read_activity))+abs(mean(disk_write_activity))
              collection_frequency: 10 sec
              collection_output: all
              window_type: sliding
              window_size: 5 min
              grouping: global
        slo-constraints:
          properties:
            name: cpu_utilization
            metric: cpu_util_prct
            operator: '>'
            threshold: 80.0
      requirements:
      - host:
          count: 1
          node_filter:
            $and:
            - $greater_or_equal:
              - $get_property:
                - SELF
                - TARGET
                - CAPABILITY
                - host
                - num-cpus
              - 1
            - $greater_or_equal:
              - $get_property:
                - SELF
                - TARGET
                - CAPABILITY
                - host
                - mem-size
              - 2
  policies:
  - stressng_colocation:
      type: swch:Scheduling.Colocation
      targets: []
