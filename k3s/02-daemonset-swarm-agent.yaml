apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: swarm-agent
  namespace: swarm-system
spec:
  selector:
    matchLabels:
      app: swarm-agent
  template:
    metadata:
      labels:
        app: swarm-agent
    spec:
      serviceAccountName: swarm-agent
      containers:
      - name: swarm-agent
        #image: zewang42/swarm-agent-7.0:amd
        #image: zewang42/swarm-agent-7.0:standalone   <- upstream prebuilt image (no monitoring code inside)
        # locally built image incl. monitoring_input + SA monitoring loop
        # (docker build + k3s ctr images import on each node)
        image: swarm-agent:metrics_collector
       # image: ghcr.io/swarmchestrate/swarm-agent:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9090
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: NODE_ROLE
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['role']
        # monitoring broker lives in the "default" namespace; SA pods run in swarm-system
        - name: MON_CLIENT_STOMP_HOST
          value: "emsserver-ems-server.default"
        volumeMounts:
        - name: config
          mountPath: /config
        - name: tosca
          mountPath: /tosca
      volumes:
      - name: config
        configMap:
          name: swarm-agent-config
      - name: tosca
        configMap:
          name: swarm-agent-tosca

